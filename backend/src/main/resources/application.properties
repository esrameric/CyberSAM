# CyberSAM Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-stacktrace=on-param

# Spring Application Name
spring.application.name=CyberSAM

# PostgreSQL Database Configuration
# For local development: Update these values or use AWS RDS endpoint
# Docker: override with SPRING_DATASOURCE_URL env var pointing to 'postgres:5432'
spring.datasource.url=jdbc:postgresql://cybersam-db.czsgeec641di.eu-north-1.rds.amazonaws.com/cybersam_db
spring.datasource.username=postgres
spring.datasource.password=Sifre123!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.cybersam=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Springdoc OpenAPI (Swagger) Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.showExtensions=true
springdoc.swagger-ui.deepLinking=true

# CORS Configuration
server.servlet.register-default-servlet=true

# Connection Pool Configuration
spring.datasource.hikari.maxPoolSize=10
spring.datasource.hikari.minIdle=2
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null