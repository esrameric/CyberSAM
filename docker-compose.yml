version: '3.8'

# CyberSAM Local Development Environment
# Run: docker-compose up -d
# Access:
#   - Frontend: http://localhost (or http://localhost:5173 for Vite dev)
#   - Backend API: http://localhost:8080
#   - Swagger UI: http://localhost:8080/swagger-ui.html
#   - PostgreSQL: localhost:5432

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cybersam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cybersam_db
      POSTGRES_USER: cybersam_user
      POSTGRES_PASSWORD: CyberSAM@Secure123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5440:5432" # Dışarıdan 5440 ile bağlanacağız
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cybersam-network
    labels:
      - "com.cybersam.service=database"

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersam-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cybersam_db
      SPRING_DATASOURCE_USERNAME: cybersam_user
      SPRING_DATASOURCE_PASSWORD: CyberSAM@Secure123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      LOGGING_LEVEL_COM_CYBERSAM: DEBUG
    ports:
      - "9595:8080" # Dışarıdan 9595 ile erişeceğiz
    depends_on:
      - postgres
        #condition: service_healthy
    networks:
      - cybersam-network
    labels:
      - "com.cybersam.service=api"

  # React Frontend (Nginx Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:9595/api/v1
    container_name: cybersam-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Tarayıcıdan http://localhost:3000 ile gireceksin, 80 (Sağ taraf): Docker'ın içindeki React/Vite uygulamasının çalıştığı porttur.
    depends_on:
      - backend
    networks:
      - cybersam-network
    labels:
      - "com.cybersam.service=frontend"

  # Optional: PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cybersam-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cybersam.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cybersam-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    labels:
      - "com.cybersam.service=pgadmin"

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  cybersam-network:
    driver: bridge
    name: cybersam-network
